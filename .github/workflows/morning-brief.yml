name: Morning Brief

on:
  # 08:00 UTC = 10:00 Gibraltar during BST (Mar–Oct), 09:00 in winter.
  # Adjust to '0 9 * * *' if you'd rather keep 10:00 Gibraltar in winter.
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python brief.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_FROM: pmcclafferty0@gmail.com
          EMAIL_TO: pmcclafferty0@gmail.com
